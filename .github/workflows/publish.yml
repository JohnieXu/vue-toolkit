# 发布到 npm：在创建 Release 或推送 v* tag 时构建并发布 vue-modal-utils
# 需在仓库 Secrets 中配置 NPM_TOKEN（npm Automation Token）
name: Publish to npm

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 版本由根目录 package.json 的 packageManager 字段决定（pnpm@9.0.0）

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Set version from tag or release
        id: version
        run: |
          if [ "${{ github.event_name }}" = 'release' ]; then
            VER="${{ github.event.release.tag_name }}"
            echo "VERSION=${VER#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Sync version and publish vue-modal-utils
        working-directory: packages/vue-modal-utils
        run: |
          if [ -n "${{ steps.version.outputs.VERSION }}" ]; then
            npm pkg set version="${{ steps.version.outputs.VERSION }}"
          fi
          npm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
